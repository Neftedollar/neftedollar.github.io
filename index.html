<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Melnikov</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #fff;
        }
        .bio {
            font-size: 1.1rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .bio .highlight {
            color: #c8a2ff;
            font-style: italic;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .links a:hover { color: #fff; }
        h2 {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Roman Melnikov</h1>
        <p class="bio">
            CTO who built <span class="highlight">teez</span> marketplace from scratch — 11K daily orders, 28K sellers, 32 cities.<br>
            Now deep in F#, .NET, Orleans, and fintech infrastructure.
        </p>
        <div class="links">
            <a href="https://github.com/Neftedollar">GitHub</a>
            <a href="https://linkedin.com/in/rmelnikov">LinkedIn</a>
        </div>
        <h2>Projects</h2>
        <div class="links">
            <a href="https://neftedollar.github.io/fyper/">Fyper</a>
            <a href="https://neftedollar.github.io/Next.fs/">Next.fs</a>
        </div>
    </div>
</body>
</html>
